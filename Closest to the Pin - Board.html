<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Closest to the Pin — Live Board</title>
<style>
  :root{
    --red:#E2001A; --red-d:#B30015; --bg:#141414; --bg2:#1A1A1A; --card:#1E1E1E; --card2:#242424;
    --line:#333; --ink:#F2F2F2; --muted:#9A9A9A; --dim:#6F6F6F; --gD:#D9D9D9;
    --din:"DIN Next 79","DIN Next LT Pro","DIN Next","DIN Alternate","Bahnschrift","Arial Narrow",Helvetica,Arial,sans-serif;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  html{background:#141414}                       /* dark base so the 20s data-reload never flashes white */
  body{background:radial-gradient(120% 100% at 50% -10%,#1d1d1d 0%,var(--bg) 55%);color:var(--ink);font-family:var(--din);overflow:hidden;letter-spacing:.01em;animation:ctpfade .5s ease}
  @keyframes ctpfade{from{opacity:.55}to{opacity:1}}
  .stage{height:100vh;display:flex;flex-direction:column;padding:26px 30px 16px}
  .top{display:flex;align-items:center;gap:18px;flex:0 0 auto}
  .redbar{height:11px;width:54px;background:var(--red)}
  .ttl{font-size:30px;font-weight:800;text-transform:uppercase;letter-spacing:-.01em;line-height:1}
  .ttl .r{color:var(--red)}
  .sub{color:var(--muted);font-size:13px;font-weight:600;margin-top:3px}
  .pill{margin-left:auto;display:flex;align-items:center;gap:9px;border:1px solid var(--red);background:rgba(226,0,26,.12);border-radius:999px;padding:8px 16px;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase}
  .pill .dot{width:9px;height:9px;border-radius:50%;background:var(--red);box-shadow:0 0 0 4px rgba(226,0,26,.2)}
  .cols{flex:1 1 auto;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px;min-height:0}
  .col{background:linear-gradient(180deg,var(--bg2),#161616);border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .col-h{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:baseline;gap:10px;background:#1c1c1c}
  .col-h .n{font-size:11px;font-weight:800;color:var(--red);letter-spacing:.14em}
  .col-h h3{font-size:19px;font-weight:800;text-transform:uppercase;letter-spacing:.01em}
  .col-h .cnt{margin-left:auto;font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .col-b{flex:1 1 auto;overflow-y:auto;padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;align-content:start}
  .col-b::-webkit-scrollbar{width:8px}.col-b::-webkit-scrollbar-thumb{background:#3a3a3a;border-radius:4px}
  .card{background:var(--card);border:1px solid var(--line);border-left:3px solid #2c2c2c;border-radius:5px;padding:11px 12px;transition:.3s var(--ease);position:relative;overflow:hidden;cursor:pointer}
  .card:hover{border-color:var(--red)}
  .card.win{border-left-color:var(--red);background:var(--card2);box-shadow:0 0 0 1px var(--red),0 14px 30px rgba(0,0,0,.45)}
  .card .who{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .card .who .nm{font-size:15px;font-weight:800;letter-spacing:.01em}
  .card .who .medal{font-size:16px}
  .card .pr{font-size:12px;line-height:1.35;color:var(--gD);max-height:2.7em;overflow:hidden;position:relative}
  .card .pr.clamp::after{content:"";position:absolute;left:0;right:0;bottom:0;height:1.4em;background:linear-gradient(transparent,var(--card))}
  .card.win .pr.clamp::after{background:linear-gradient(transparent,var(--card2))}
  .card img.shot{display:block;width:100%;height:160px;object-fit:cover;object-position:center;border-radius:4px;margin-top:8px;border:1px solid var(--line);background:#0d0d0d}
  .vote{display:flex;align-items:center;gap:8px;margin-top:10px}
  .vote .bar{flex:1 1 auto;height:8px;background:#2a2a2a;border-radius:4px;overflow:hidden}
  .vote .bar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--red-d),var(--red));border-radius:4px;transition:width 1.1s var(--ease)}
  .vote .num{font-size:13px;font-weight:800;color:#fff;min-width:64px;text-align:right}
  .vote .num b{color:var(--red)}
  body.results .vote{display:flex}
  body.results .pr{max-height:3.0em}
  .ov{position:fixed;inset:0;background:rgba(10,10,10,.93);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:40}
  .ov.on{display:flex}
  .ov .box{text-align:center;max-width:680px;padding:30px}
  .ov .redbar{margin:0 auto 18px}
  .ov h2{font-size:46px;font-weight:800;text-transform:uppercase;line-height:1.02}
  .ov h2 .r{color:var(--red)}
  .ov p{color:var(--gD);font-size:18px;font-weight:600;margin:14px 0 26px}
  .ov .qr{position:relative;width:392px;height:392px;background:#fff;border-radius:12px;padding:16px;margin:0 auto;display:flex;align-items:center;justify-content:center}
  .ov .qr #voteqr{width:100%;height:100%;object-fit:contain}
  .ov .qrlogo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:27%;background:#fff;padding:8px;border-radius:8px;box-shadow:0 0 0 4px #fff;display:flex}
  .ov .qrlogo img{width:100%;height:auto;display:block;filter:brightness(0)}
  .ov .lk{margin-top:16px;font-size:15px;font-weight:700;color:var(--muted)}
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.94);display:none;align-items:center;justify-content:center;z-index:50;cursor:zoom-out;padding:4vh 4vw}
  .lb.on{display:flex}
  .lbinner{max-width:90vw;max-height:92vh;display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center}
  .lb img{max-width:84vw;max-height:62vh;object-fit:contain;border-radius:8px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .lbname{font-size:26px;font-weight:800;color:#fff;text-transform:uppercase;letter-spacing:.01em}
  .lbprompt{font-size:18px;line-height:1.5;color:var(--gD);max-width:72ch;font-weight:500;white-space:pre-wrap}
  .foot{flex:0 0 auto;display:flex;align-items:center;gap:16px;padding-top:12px;color:var(--dim);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .foot .k{color:var(--gD);border:1px solid var(--line);border-radius:3px;padding:3px 7px;margin-right:5px}
  .foot .fbtn{background:transparent;border:1px solid var(--line);color:var(--gD);font-family:var(--din);font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:6px 11px;border-radius:4px;cursor:pointer;display:inline-flex;align-items:center;transition:.2s}
  .foot .fbtn:hover{border-color:var(--red);color:#fff;background:rgba(226,0,26,.12)}
  .foot .sp{margin-left:auto;color:var(--muted)}
  .empty{grid-column:1/-1;color:var(--dim);font-size:13px;text-align:center;padding:24px 8px;font-weight:600}
  .confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:45;opacity:.9;pointer-events:none}
</style>
</head>
<body>
<div class="stage">
  <div class="top">
    <div class="redbar"></div>
    <div>
      <div class="ttl">CLOSEST TO <span class="r">THE PIN</span></div>
      <div class="sub" id="sub">The room's best shots — World Marketing Summit</div>
    </div>
    <div class="pill"><span class="dot"></span><span id="state">Gallery</span></div>
  </div>
  <div class="cols" id="cols"></div>
  <div class="foot">
    <button class="fbtn" id="btnVote"><span class="k">V</span>Open voting</button>
    <button class="fbtn" id="btnReveal"><span class="k">R</span>Reveal winners</button>
    <button class="fbtn" id="btnGallery"><span class="k">G</span>Gallery</button>
    <span class="sp" id="count"></span>
  </div>
</div>
<div class="ov" id="ov">
  <div class="box">
    <div class="redbar"></div>
    <h2>Vote for <span class="r">the pin</span></h2>
    <p>Scan and pick your favorite shot in each of the three pins. Most votes wins.</p>
    <div class="qr"><img id="voteqr" alt="Scan to vote"><span class="qrlogo"><img src="assets/logo/metal-t.png" alt=""></span></div>
    <div class="lk">or open <b id="votelk">ctp-proxy.ali-chitsaz.workers.dev/vote</b></div>
  </div>
</div>
<div class="lb" id="lb"><div class="lbinner"><img id="lbimg" alt=""><div class="lbname" id="lbname"></div><div class="lbprompt" id="lbprompt"></div></div></div>

<!-- Live data is rewritten into ctp-data.js by the background refresh task. The board reloads to pick it up. -->
<script src="ctp-data.js"></script>
<script>
(function(){
  "use strict";

  /* ---- data: from ctp-data.js (window.CTP_DATA); falls back to samples so the file works standalone ---- */
  var PROXY_URL = "https://ctp-proxy.ali-chitsaz.workers.dev/";  /* Cloudflare Worker — fast 20s soft auto-refresh straight from monday */
  var D = (typeof window!=="undefined" && window.CTP_DATA) ? window.CTP_DATA : {};
  var VOTE_FORM = "https://ctp-proxy.ali-chitsaz.workers.dev/vote";  /* live phone-vote page (served by the Worker) — not the monday form */
  var SCENARIOS = D.scenarios || [
    {key:"s1",n:"Pin 1",title:"Masters Monday",sub:"Build the plan"},
    {key:"s2",n:"Pin 2",title:"The Headcover",sub:"Design the image"},
    {key:"s3",n:"Pin 3",title:"Back 2 Back",sub:"Rory's moment"}
  ];
  var ENTRIES = D.entries || [
    {name:"Ali Chitsaz",scenario:"s1",votes:7,image:"assets/img/di_demo1.jpg",
     prompt:"Act as TM's GTM lead — Scottie just put the Qi4D in the bag at Augusta. Draft the Monday launch plan: hero message, 3 social beats, athlete + retail asks, 2-week timeline."},
    {name:"Graeme Morton",scenario:"s2",votes:5,image:null,
     prompt:"Design a bold headcover for a European event — TM red with a subtle tartan motif and a clean 'Dialed In' wordmark. Write the Firefly prompt to generate three options."},
    {name:"Akira Nakayama",scenario:"s3",votes:6,image:null,
     prompt:"Write a LINE broadcast + a retail-window story for Japan riding Rory's back-to-back Masters with the Spider putter. Premium, restrained, fan-first — localize the headline."}
  ];

  var $=function(s){return document.querySelector(s)};
  var medals=["🏆","🥈","🥉"];
  var mode = "gallery";
  try{ mode = localStorage.getItem("ctp_mode") || "gallery"; }catch(e){}

  function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}

  /* keep image URLs stable per entry id — monday re-signs each photo's URL on every fetch, so without this every picture re-downloads every refresh (the "dial-up" flicker) */
  var IMGCACHE={}, _lastSig=null;
  function sigOf(){ var s=mode; for(var i=0;i<ENTRIES.length;i++){ s+="|"+ENTRIES[i].id+":"+(ENTRIES[i].votes||0); } return s; }

  function render(){
    var cols=$("#cols"); cols.innerHTML="";
    SCENARIOS.forEach(function(sc){
      var list=ENTRIES.filter(function(e){return e.scenario===sc.key;});
      if(mode==="results") list.sort(function(a,b){return (b.votes||0)-(a.votes||0);});
      var max=Math.max.apply(null,list.map(function(e){return e.votes||0;}).concat([1]));
      var col=document.createElement("div"); col.className="col";
      var cards=list.map(function(e,i){
        var win=mode==="results"&&i===0&&(e.votes||0)>0;
        var medal=mode==="results"?'<span class="medal">'+(medals[i]||"")+'</span>':'';
        var img=e.image?'<img class="shot" src="'+e.image+'" alt="" onerror="this.style.display=\'none\'">':'';
        var pct=Math.round((e.votes||0)/max*100);
        return '<div class="card'+(win?' win':'')+'" data-name="'+esc(e.name)+'" data-prompt="'+esc(e.prompt)+'" data-img="'+(e.image?esc(e.image):'')+'">'+
          '<div class="who">'+medal+'<span class="nm">'+esc(e.name)+'</span></div>'+
          '<div class="pr clamp">'+esc(e.prompt)+'</div>'+img+
          '<div class="vote"><div class="bar"><i data-w="'+pct+'"></i></div><div class="num"><b>'+(e.votes||0)+'</b> votes</div></div>'+
          '</div>';
      }).join("");
      if(!cards) cards='<div class="empty">No shots yet — scan to drop yours.</div>';
      col.innerHTML='<div class="col-h"><span class="n">'+sc.n+'</span><h3>'+sc.title+'</h3><span class="cnt">'+list.length+' shot'+(list.length===1?'':'s')+'</span></div><div class="col-b">'+cards+'</div>';
      cols.appendChild(col);
    });
    requestAnimationFrame(function(){ setTimeout(function(){
      document.querySelectorAll('.vote .bar i').forEach(function(b){ b.style.width=b.dataset.w+'%'; });
    },120); });
    /* whole-card clicks open the full view — handled by the delegated listener on #cols */
    $("#count").textContent=ENTRIES.length+" shots on the board"+(D.updated?(" · "+D.updated):"");
    _lastSig=sigOf();
  }

  function apply(confetti){
    document.body.classList.toggle("results", mode==="results");
    $("#ov").classList.toggle("on", mode==="vote");
    if(mode==="vote"){
      $("#voteqr").src="https://api.qrserver.com/v1/create-qr-code/?size=800x800&margin=8&ecc=H&data="+encodeURIComponent(VOTE_FORM);
      $("#votelk").textContent=VOTE_FORM.replace(/^https?:\/\//,"");
    }
    $("#state").textContent = mode==="results"?"Winners":(mode==="vote"?"Voting open":"Gallery");
    $("#sub").textContent = mode==="results"?"Most votes takes the pin — your champions":(mode==="vote"?"Scan to vote — pick your favorite in each pin":"The room's best shots — World Marketing Summit");
    render();
    if(mode==="results"&&confetti) burst();
  }
  function setMode(m,confetti){ mode=m; try{localStorage.setItem("ctp_mode",m);}catch(e){} apply(confetti); }

  function burst(){
    var cols=["#E2001A","#fff","#B30015","#D9D9D9"];
    for(var i=0;i<70;i++){ (function(){
      var c=document.createElement("div"); c.className="confetti";
      c.style.left=Math.random()*100+"vw"; c.style.background=cols[i%cols.length];
      document.body.appendChild(c);
      var dur=2200+Math.random()*1600, x=(Math.random()*2-1)*120;
      c.animate([{transform:"translate(0,0) rotate(0)",opacity:1},{transform:"translate("+x+"px,104vh) rotate("+(720*(Math.random()>.5?1:-1))+"deg)",opacity:.9}],{duration:dur,easing:"cubic-bezier(.3,.6,.4,1)"});
      setTimeout(function(){c.remove();},dur);
    })(); }
  }

  document.addEventListener("keydown",function(e){
    var k=e.key.toLowerCase();
    if(k==="v"){ setMode(mode==="vote"?"gallery":"vote",false); }
    else if(k==="r"){ reveal(); }
    else if(k==="g"){ setMode("gallery",false); }
    else if(k==="f"){ if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();}else{document.exitFullscreen&&document.exitFullscreen();} }
    else if(k==="escape"){ if(mode==="vote")setMode("gallery",false); $("#lb").classList.remove("on"); }
  });
  $("#ov").addEventListener("click",function(){ if(mode==="vote") setMode("gallery",false); });
  $("#lb").addEventListener("click",function(){$("#lb").classList.remove("on");});
  function openCard(d){ var im=$("#lbimg"); if(d.img){ im.src=d.img; im.style.display="block"; } else { im.style.display="none"; } $("#lbname").textContent=d.name||""; $("#lbprompt").textContent=d.prompt||""; $("#lb").classList.add("on"); }
  $("#cols").addEventListener("click",function(ev){ var c=ev.target.closest(".card"); if(c) openCard(c.dataset); });

  // Reveal: with a proxy it's a soft state change (data already fresh); without one, reload to pull the task's final tallies.
  function reveal(){ if(PROXY_URL){ setMode("results",true); } else { try{ localStorage.setItem("ctp_mode","results"); localStorage.setItem("ctp_burst","1"); }catch(e){} location.reload(); } }
  var b1=$("#btnVote"),b2=$("#btnReveal"),b3=$("#btnGallery");
  if(b1)b1.addEventListener("click",function(){ setMode(mode==="vote"?"gallery":"vote",false); });
  if(b2)b2.addEventListener("click",reveal);
  if(b3)b3.addEventListener("click",function(){ setMode("gallery",false); });

  // ----- PROXY MODE: fetch monday live every 20s, transform + tally client-side, soft re-render (no reload) -----
  function mapScenario(t){ t=t||""; if(t.indexOf("Masters Monday")>-1)return "s1"; if(t.indexOf("Headcover")>-1)return "s2"; if(t.indexOf("Back 2 Back")>-1)return "s3"; return ""; }
  function transform(raw){
    function bds(x){ return (x && ((x.data&&x.data.boards)||x.boards)) || []; }
    var s=(bds(raw.submissions)[0]||{}); s=(s.items_page&&s.items_page.items)||[];
    var v=(bds(raw.votes)[0]||{}); v=(v.items_page&&v.items_page.items)||[];
    function cv(it,id){ var a=it.column_values||[]; for(var i=0;i<a.length;i++) if(a[i].id===id) return a[i].text||""; return ""; }
    var out=[];
    s.forEach(function(it){ var sc=mapScenario(cv(it,"single_selectw0p7rg3")); if(!sc)return;
      out.push({id:String(it.id),name:it.name,scenario:sc,prompt:cv(it,"long_textukit48un"),image:(it.assets&&it.assets[0]?it.assets[0].public_url:null),votes:0}); });
    /* live phone voting: each vote is an item on the Votes board whose NAME = the voted submission's id */
    var tally={}; v.forEach(function(x){ var nm=(x.name||"").trim(); if(nm) tally[nm]=(tally[nm]||0)+1; });
    out.forEach(function(e){ e.votes=tally[e.id]||0; if(IMGCACHE[e.id]){ e.image=IMGCACHE[e.id]; } else if(e.image){ IMGCACHE[e.id]=e.image; } });
    return out;
  }
  function loadFromProxy(){ fetch(PROXY_URL,{cache:"no-store"}).then(function(r){return r.json();}).then(function(raw){ ENTRIES=transform(raw); if(sigOf()!==_lastSig){ render(); } }).catch(function(e){ console.warn("CTP proxy fetch failed:",e); }); }

  var doBurst=false; try{ if(mode==="results" && localStorage.getItem("ctp_burst")==="1"){ doBurst=true; localStorage.removeItem("ctp_burst"); } }catch(e){}
  apply(doBurst);                     // restore last mode; confetti only right after a Reveal
  if(PROXY_URL){
    loadFromProxy();                                   // fast + soft + no flicker (CORS proxy) — overlays stay put
    setInterval(loadFromProxy, 12000);
  } else {
    // no proxy yet: ctp-data.js (written by the scheduled task) + reload only while in Gallery
    setInterval(function(){ if(mode==="gallery"){ location.reload(); } }, 20000);
  }
})();
</script>
</body>
</html>
